<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío Numérico - Crisis de Carburantes</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Archivo CSS externo personalizado -->
    <link href="{{ url_for('escenario_B.static', filename='css/style.css') }}" rel="stylesheet">
    <link href="{{ url_for('escenario_B.static', filename='css/layout.css') }}" rel="stylesheet">
    <link href="{{ url_for('escenario_B.static', filename='css/components.css') }}" rel="stylesheet">
    
    <!-- Configuración y script de MathJax -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\$', '\\$']],
                displayMath: [['$$', '$$'], ['\\$', '\\$']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>
<body class="bg-light">
    <div class="container-custom py-5">
        {% block content %}{% endblock %}
    </div>
    
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
